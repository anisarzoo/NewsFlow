<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - News Platform</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>News<span>Flow</span> <small style="font-size: 0.8rem; opacity: 0.6; margin-left: 8px;">ADMIN</small>
            </h1>
            <nav>
                <a href="index.html">View Site</a>
                <button id="logout-btn" style="display: none;">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Login Section -->
        <section id="login-section">
            <div class="login-card">
                <h2>Admin Login</h2>
                <div style="text-align: center;">
                    <p style="margin-bottom: 1rem; color: #666;">Sign in to manage articles</p>
                    <button id="google-login-btn" class="btn-primary"
                        style="display: flex; align-items: center; justify-content: center; width: 100%; gap: 10px;">
                        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.566 2.684-3.873 2.684-6.615z"
                                fill="#4285F4"></path>
                            <path
                                d="M9 18c2.43 0 4.467-.806 5.956-2.18L12.049 13.56c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z"
                                fill="#34A853"></path>
                            <path
                                d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
                                fill="#FBBC05"></path>
                            <path
                                d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.272C4.672 5.14 6.656 3.58 9 3.58z"
                                fill="#EA4335"></path>
                        </svg>
                        Sign in with Google
                    </button>
                    <p id="login-error" class="error-message"></p>
                </div>
            </div>
        </section>

        <!-- Dashboard Section (Hidden by default) -->
        <section id="dashboard-section" style="display: none;">
            <div class="dashboard-header">
                <h2>Manage Articles</h2>
                <div class="header-actions">
                    <button id="back-btn" class="btn-primary" style="display: none;">
                        Back to Dashboard
                    </button>
                    <button id="create-article-btn" class="btn-primary">Create New Article</button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="admin-search-input" placeholder="Search articles...">
            </div>

            <!-- Category Filters -->
            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">All Articles</button>
                <button class="filter-btn" data-filter="live">Live</button>
                <button class="filter-btn" data-filter="draft">Drafts</button>
                <button class="filter-btn" data-filter="scheduled">Scheduled</button>
            </div>

            <!-- Create/Edit Modal or Form Section -->
            <div id="article-form-container" class="hidden">
                <h3 id="form-title" style="margin-bottom: 1.5rem; font-size: 1.5rem;">Create Article</h3>

                <!-- Smart Publish Section -->
                <div class="smart-publish-box">
                    <label>Smart Publish (Import from URL)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="url" id="import-url" placeholder="Paste article URL here...">
                        <button type="button" id="fetch-url-btn" class="btn-primary">Fetch</button>
                    </div>
                </div>

                <form id="article-form">
                    <input type="hidden" id="article-id">
                    <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 1rem;">
                        <div class="form-group" style="flex: 2;">
                            <label for="article-title">Title</label>
                            <input type="text" id="article-title" placeholder="e.g. Breaking News: Space Exploration"
                                required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="article-category">Category</label>
                            <select id="article-category">
                                <option value="Uncategorized">Select Category</option>
                                <option value="World">World</option>
                                <option value="Politics">Politics</option>
                                <option value="Business">Business</option>
                                <option value="Tech">Tech</option>
                                <option value="Science">Science</option>
                                <option value="Health">Health</option>
                                <option value="Sports">Sports</option>
                                <option value="Entertainment">Entertainment</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="article-image">Main Image</label>
                        <div class="image-upload-controls" style="display:flex; gap:10px; align-items:center;">
                            <input type="url" id="article-image" style="flex:1;"
                                placeholder="https://example.com/image.jpg">
                            <span style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">OR</span>
                            <label class="btn-primary"
                                style="font-size:0.8rem; padding: 10px 16px; cursor:pointer; height: 100%; display: flex; align-items: center; margin: 0;">
                                Upload
                                <input type="file" id="main-image-upload" accept="image/*" style="display:none;">
                            </label>
                        </div>
                        <div id="main-image-status"
                            style="font-size:0.8rem; color:var(--secondary); font-weight:600; margin-top:5px;"></div>
                        <div id="main-image-preview" class="block-preview" style="margin-top: 10px;"></div>
                    </div>

                    <div class="form-group">
                        <label>Content Layout</label>
                        <div id="content-blocks-container">
                            <!-- Dynamic Blocks will be added here -->
                        </div>
                        <div class="add-block-controls">
                            <button type="button" id="add-text-btn" class="add-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
                                    <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />
                                </svg>
                                Text
                            </button>
                            <button type="button" id="add-image-btn" class="add-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                    <circle cx="8.5" cy="8.5" r="1.5" />
                                    <polyline points="21 15 16 10 5 21" />
                                </svg>
                                Image
                            </button>
                            <button type="button" id="add-video-btn" class="add-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16">
                                    <polygon points="23 7 16 12 23 17 23 7" />
                                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                                </svg>
                                Video
                            </button>
                        </div>
                    </div>
                    <div class="form-section-divider"></div>
                    <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-main);">Publishing Settings
                    </h3>
                    <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 2rem;">
                        <div class="form-group" style="flex:1;">
                            <label for="article-status">Status</label>
                            <select id="article-status">
                                <option value="published">Published</option>
                                <option value="draft">Draft</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label for="article-date">Publish Date (Optional)</label>
                            <input type="datetime-local" id="article-date">
                            <small style="color:var(--text-muted); display:block; margin-top:4px;">Leave empty to
                                publish immediately</small>
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 2rem; display: flex; align-items: center; gap: 1rem;">
                        <button type="submit" class="btn-primary">Save Changes</button>
                        <button type="button" id="cancel-edit-btn" class="btn-text">Discard</button>
                    </div>
                </form>
            </div>

            <div id="articles-list" class="articles-list">
                <!-- Admin specific article list items -->
                <p>Loading...</p>
            </div>
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script type="module" src="js/admin.js"></script>
</body>

</html>
